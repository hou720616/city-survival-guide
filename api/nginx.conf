# IP 限流：每个 IP 每分钟最多 6 次请求，防脚本刷接口
limit_req_zone $binary_remote_addr zone=csg_limit:10m rate=6r/m;

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name 124.220.65.144;

    # 限制请求体大小，防止超大 payload
    client_max_body_size 64k;

    location /api/ {
        # 突发允许 10 个请求，超出立即返回 429
        limit_req zone=csg_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location / {
        root /home/ubuntu/csg-project/dist;
        try_files $uri $uri/ /index.html;
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    access_log /var/log/nginx/csg_access.log;
    error_log /var/log/nginx/csg_error.log;
}
