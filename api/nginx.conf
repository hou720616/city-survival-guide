# IP 限流：每个 IP 每分钟最多 6 次请求，防脚本刷接口
limit_req_zone $binary_remote_addr zone=csg_limit:10m rate=6r/m;

# ===== 443 HTTPS（自签名，用于 GitHub Pages 前端跨域访问）=====
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name 124.220.65.144;

    ssl_certificate /etc/nginx/ssl/csg-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/csg-selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 允许跨域（GitHub Pages）
    add_header Access-Control-Allow-Origin "https://hou720616.github.io" always;
    add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;
    add_header Access-Control-Allow-Credentials "true" always;

    client_max_body_size 64k;

    location /api/ {
        limit_req zone=csg_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location / {
        root /home/ubuntu/csg-project/dist;
        try_files $uri $uri/ /index.html;
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    access_log /var/log/nginx/csg_ssl_access.log;
    error_log /var/log/nginx/csg_ssl_error.log;
}

# ===== 8080 HTTP（保留，本地可直接访问）=====
server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name 124.220.65.144;

    client_max_body_size 64k;

    location /api/ {
        limit_req zone=csg_limit burst=10 nodelay;
