[program:csg-api]
command=/home/ubuntu/venv/bin/gunicorn -c gunicorn.conf.py main:app
directory=/home/ubuntu/csg-project/api
user=ubuntu
autostart=true
autorestart=true
startretries=3
redirect_stderr=true
stdout_logfile=/home/ubuntu/csg-project/api/logs/supervisor.log
stderr_logfile=/home/ubuntu/csg-project/api/logs/supervisor.err
environment=PATH="/home/ubuntu/venv/bin:%(ENV_PATH)s"