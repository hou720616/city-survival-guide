limit_req_zone $binary_remote_addr zone=csg_limit:10m rate=6r/m;

server {
    listen 8080;
    server_name 124.220.65.144;

    client_max_body_size 64k;

    location /api/ {
        limit_req zone=csg_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location / {
        root /home/ubuntu/csg-project/dist;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(html)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    location ~* \.(js|css|png|jpg|svg|woff2|woff|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/csg_access.log;
    error_log /var/log/nginx/csg_error.log;
}
